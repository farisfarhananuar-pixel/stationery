[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.fileinfo", "php82Extensions.gd", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.tokenizer", "php82Extensions.openssl", "composer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction"
]

[phases.build]
cmds = [
    "php artisan config:clear",
    "php artisan storage:link || true"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force --class=DatabaseSeeder 2>/dev/null || true && php -S 0.0.0.0:$PORT -t public"
