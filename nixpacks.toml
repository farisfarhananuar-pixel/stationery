[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.fileinfo", "php82Extensions.gd", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.tokenizer", "php82Extensions.openssl"]
aptPkgs = ["curl", "unzip"]
cmds = [
    "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer",
    "ln -sf /usr/local/bin/composer /usr/bin/composer || true"
]

[phases.install]
cmds = [
    "COMPOSER_ALLOW_SUPERUSER=1 COMPOSER_NO_AUDIT=1 /usr/local/bin/composer update --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs --no-audit"
]

[phases.build]
cmds = [
    "php artisan config:clear",
    "php artisan storage:link || true"
]

[start]
cmd = "COMPOSER_ALLOW_SUPERUSER=1 COMPOSER_NO_AUDIT=1 /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs --no-audit && php artisan migrate --force && php artisan db:seed --force 2>/dev/null; php artisan storage:link 2>/dev/null; php -S 0.0.0.0:$PORT -t public"
